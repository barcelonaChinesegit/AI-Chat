<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
        }
        
        .back-button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: #5568d3;
        }
        
        .user-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
        }
        
        .avatar-section {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 10px;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }
        
        .username {
            font-size: 24px;
            font-weight: 600;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .info-value {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        
        .vip-badge {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .normal-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #e0e0e0;
            color: #666;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .action-button {
            flex: 1;
            min-width: 150px;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-button {
            background: #ff4757;
            color: white;
        }
        
        .logout-button:hover {
            background: #ee2233;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }
        
        .ai-chat-button {
            background: #667eea;
            color: white;
        }
        
        .ai-chat-button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ff4757;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .action-button {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 用户中心</h1>
            <button class="back-button" onclick="window.location.href='/'">← 返回主页</button>
        </div>
        
        <div id="content">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        // 页面加载时获取用户信息
        window.addEventListener('load', async () => {
            await loadUserInfo();
        });
        
        async function loadUserInfo() {
            try {
                const response = await fetch('/get_current_user');
                const data = await response.json();
                
                if (data.logged_in && data.success) {
                    renderUserInfo(data);
                } else {
                    // 未登录，跳转到登录页
                    alert('请先登录');
                    window.location.href = '/Login.html';
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
                document.getElementById('content').innerHTML = '<div class="error">加载失败，请刷新重试</div>';
            }
        }
        
        function renderUserInfo(user) {
            const vipBadge = user.is_vip 
                ? '<span class="vip-badge">👑 VIP会员</span>'
                : '<span class="normal-badge">普通用户</span>';
            
            // 显示用户头像或默认头像
            const avatarDisplay = user.avatar || '👤';
            
            const html = `
                <div class="user-card">
                    <div class="avatar-section">
                        <div class="avatar" id="currentAvatar" style="cursor: pointer;" onclick="showAvatarSelector()" title="点击更换头像">${avatarDisplay}</div>
                        <div class="username">${escapeHtml(user.username)}</div>
                        <div style="font-size: 12px; opacity: 0.8; margin-top: 5px;">点击头像更换</div>
                    </div>
                </div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">用户ID</div>
                        <div class="info-value">${user.user_id}</div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label">账号状态</div>
                        <div class="info-value">${vipBadge}</div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label">邮箱地址</div>
                        <div class="info-value">${user.email || '未设置'}</div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label">注册时间</div>
                        <div class="info-value">${formatDate(user.created_at)}</div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-label">最后登录</div>
                        <div class="info-value">${formatDate(user.last_login)}</div>
                    </div>
                </div>
                
                <div class="actions">
                    <button class="action-button ai-chat-button" onclick="window.location.href='/AIChat.html'">
                        🤖 AI聊天
                    </button>
                    <button class="action-button logout-button" onclick="logout()">
                        🚪 退出登录
                    </button>
                </div>
                
                <div style="margin-top: 30px; padding-top: 30px; border-top: 2px solid #f0f0f0;">
                    <h3 style="margin-bottom: 20px; color: #333;">账号设置</h3>
                    
                    <!-- 修改邮箱 -->
                    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 15px;">
                        <h4 style="margin-bottom: 15px; color: #555;">修改邮箱</h4>
                        <input type="email" id="newEmail" placeholder="新邮箱地址" 
                            style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <input type="password" id="emailPassword" placeholder="请输入当前密码验证" 
                            style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <button onclick="updateEmail()" 
                            style="width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">
                            确认修改邮箱
                        </button>
                    </div>
                    
                    <!-- 修改密码 -->
                    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px;">
                        <h4 style="margin-bottom: 15px; color: #555;">修改密码</h4>
                        <input type="password" id="oldPassword" placeholder="当前密码" 
                            style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <input type="password" id="newPassword" placeholder="新密码（至少6个字符）" 
                            style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <input type="password" id="confirmPassword" placeholder="确认新密码" 
                            style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <button onclick="updatePassword()" 
                            style="width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">
                            确认修改密码
                        </button>
                    </div>
                </div>
                
                <!-- 头像选择器（隐藏） -->
                <div id="avatarSelector" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
                    <div style="background:white; padding:30px; border-radius:15px; max-width:500px; max-height:80vh; overflow-y:auto;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                            <h3 style="margin:0;">选择头像</h3>
                            <button onclick="hideAvatarSelector()" style="background:none; border:none; font-size:24px; cursor:pointer;">×</button>
                        </div>
                        <div style="display:grid; grid-template-columns:repeat(6, 1fr); gap:10px;">
                            ${['👤','👨','👩','🧑','👨‍💻','👩‍💻','🤖','😀','😎','🥳','🤓','🧐','🐱','🐶','🐼','🐯','🦁','🐸','🐥','🦄','🐉','🦋','🌸','🌺','🌻','🌈','⭐','🌙','☀️','🔥','💎','🎨','🎭','🎪','🎯','🏆','🎖️','🎁'].map(emoji => 
                                `<div class="avatar-option" onclick="selectAvatar('${emoji}')" style="width:60px; height:60px; display:flex; align-items:center; justify-content:center; font-size:40px; cursor:pointer; border:2px solid #ddd; border-radius:10px; transition:all 0.2s;" onmouseover="this.style.borderColor='#667eea'; this.style.transform='scale(1.1)'" onmouseout="this.style.borderColor='#ddd'; this.style.transform='scale(1)'">${emoji}</div>`
                            ).join('')}
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }
        
        // 显示头像选择器
        function showAvatarSelector() {
            document.getElementById('avatarSelector').style.display = 'flex';
        }
        
        // 隐藏头像选择器
        function hideAvatarSelector() {
            document.getElementById('avatarSelector').style.display = 'none';
        }
        
        // 选择头像
        async function selectAvatar(emoji) {
            try {
                const response = await fetch('/upload_avatar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `image_data=${encodeURIComponent(emoji)}`
                });
                const data = await response.json();
                
                if (data.success) {
                    // 更新显示
                    document.getElementById('currentAvatar').textContent = emoji;
                    hideAvatarSelector();
                    alert('头像更换成功！');
                } else {
                    alert(data.message || '头像更换失败');
                }
            } catch (error) {
                console.error('更换头像失败:', error);
                alert('更换头像失败，请重试');
            }
        }
        
        async function updateEmail() {
            const newEmail = document.getElementById('newEmail').value.trim();
            const password = document.getElementById('emailPassword').value.trim();
            
            if (!newEmail || !password) {
                alert('请填写完整信息');
                return;
            }
            
            try {
                const response = await fetch('/update_email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `new_email=${encodeURIComponent(newEmail)}&old_password=${encodeURIComponent(password)}`
                });
                const data = await response.json();
                
                if (data.success) {
                    alert('邮箱修改成功！');
                    document.getElementById('newEmail').value = '';
                    document.getElementById('emailPassword').value = '';
                    await loadUserInfo(); // 重新加载用户信息
                } else {
                    alert(data.message || '邮箱修改失败');
                }
            } catch (error) {
                console.error('修改邮箱失败:', error);
                alert('修改邮箱失败，请重试');
            }
        }
        
        async function updatePassword() {
            const oldPassword = document.getElementById('oldPassword').value.trim();
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            
            if (!oldPassword || !newPassword || !confirmPassword) {
                alert('请填写完整信息');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                alert('两次输入的新密码不一致');
                return;
            }
            
            if (newPassword.length < 6) {
                alert('新密码长度至少6个字符');
                return;
            }
            
            try {
                const response = await fetch('/update_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `old_password=${encodeURIComponent(oldPassword)}&new_password=${encodeURIComponent(newPassword)}`
                });
                const data = await response.json();
                
                if (data.success) {
                    alert('密码修改成功！请使用新密码登录');
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    alert(data.message || '密码修改失败');
                }
            } catch (error) {
                console.error('修改密码失败:', error);
                alert('修改密码失败，请重试');
            }
        }
        
        async function logout() {
            if (!confirm('确定要退出登录吗？')) {
                return;
            }
            
            try {
                const response = await fetch('/logout', {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    alert('已退出登录');
                    window.location.href = '/';
                } else {
                    alert('退出失败，请重试');
                }
            } catch (error) {
                console.error('退出失败:', error);
                alert('退出失败，请重试');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '未知';
            try {
                return new Date(dateStr).toLocaleString('zh-CN');
            } catch {
                return dateStr;
            }
        }
    </script>
</body>
</html>
