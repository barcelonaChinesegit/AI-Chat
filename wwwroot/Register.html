<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册页面</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .register-container {
            background-color: #fff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .register-container h2 {
            margin-bottom: 35px;
            color: #333;
            font-size: 32px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            text-align: left;
            font-weight: 500;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group input[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .form-group input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .links {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .links a:hover {
            text-decoration: underline;
            color: #764ba2;
        }
        
        .logo-section {
            margin-bottom: 25px;
        }
        
        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        /* 响应式设计 - 平板 */
        @media screen and (max-width: 768px) {
            .register-container {
                padding: 30px;
                max-width: 400px;
            }
            .register-container h2 {
                font-size: 24px;
            }
        }
        
        /* 响应式设计 - 手机 */
        @media screen and (max-width: 480px) {
            body {
                padding: 10px;
            }
            .register-container {
                padding: 25px 20px;
                border-radius: 8px;
            }
            .register-container h2 {
                font-size: 22px;
                margin-bottom: 25px;
            }
            .form-group {
                margin-bottom: 15px;
            }
            .form-group input {
                padding: 10px 12px;
                font-size: 16px;
            }
            .form-group input[type="submit"] {
                font-size: 15px;
            }
            .links {
                flex-direction: column;
                gap: 12px;
            }
            .links a {
                font-size: 13px;
            }
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo-section">
            <div class="logo-icon">🤖</div>
        </div>
        <h2>创建账号</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名" minlength="3" maxlength="20">
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱地址（可选）">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" name="confirm-password" required placeholder="请再次输入密码">
            </div>
            <div class="form-group">
                <input type="submit" value="注册" id="submitBtn">
            </div>
            <div id="message" class="message"></div>
            <div class="links">
                <a href="Login.html">已有账号？登录</a>
                <a href="index.html">返回主页</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            // 前端验证
            if (password !== confirmPassword) {
                messageDiv.textContent = '两次输入的密码不一致';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            if (username.length < 3 || username.length > 20) {
                messageDiv.textContent = '用户名长度必须在3-20个字符之间';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.textContent = '密码长度至少6个字符';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            // 禁用提交按钮
            submitBtn.disabled = true;
            submitBtn.value = '注册中...';
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&email=${encodeURIComponent(email)}`
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.textContent = data.message + '！2秒后跳转到登录页面...';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    
                    // 2秒后跳转到登录页
                    setTimeout(() => {
                        window.location.href = 'Login.html';
                    }, 2000);
                } else {
                    messageDiv.textContent = data.message;
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.value = '注册';
                }
            } catch (error) {
                messageDiv.textContent = '注册失败：' + error.message;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.value = '注册';
            }
        });
    </script>
</body>
</html>
